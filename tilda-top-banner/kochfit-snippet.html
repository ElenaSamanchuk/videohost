<!-- Блок T123 — плашка VK (Zero Block rec2317813501). Cookie-скрипт не трогаем. -->
<style>
#rec2317813501 {
  position: fixed !important;
  margin: 0 !important;
  padding: 0 !important;
  z-index: 1000001 !important;
  opacity: 1 !important;
  visibility: visible !important;
  overflow: visible !important;
  transition: transform 1.5s cubic-bezier(0.4, 0, 0.2, 1);
  pointer-events: none;
  will-change: transform;
}

#rec2317813501 .t396,
#rec2317813501 .t396__artboard,
#rec2317813501 .t396__carrier,
#rec2317813501 .t396__filter {
  overflow: visible !important;
}

@media screen and (max-width: 768px) {
  #rec2317813501 {
    top: 0 !important;
    left: 0 !important;
    right: 0 !important;
    width: 100% !important;
    max-width: 100% !important;
    transform: translate3d(0, -110%, 0);
  }

  #rec2317813501.top-banner--visible {
    transform: translate3d(0, 0, 0);
    pointer-events: auto;
  }

  #rec2317813501.top-banner--hiding {
    transform: translate3d(0, -110%, 0);
    pointer-events: none;
  }
}

@media screen and (min-width: 769px) {
  #rec2317813501 {
    top: 96px !important;
    left: 16px !important;
    right: auto !important;
    width: 1200px !important;
    max-width: calc(100vw - 32px) !important;
    transform: translate3d(calc(-100% - 32px), 0, 0);
  }

  #rec2317813501.top-banner--visible {
    transform: translate3d(0, 0, 0);
    pointer-events: auto;
  }

  #rec2317813501.top-banner--hiding {
    transform: translate3d(calc(-100% - 32px), 0, 0);
    pointer-events: none;
  }
}

#rec2317813501 [data-elem-id="1779882150069"] {
  z-index: 200 !important;
  pointer-events: auto !important;
  cursor: pointer !important;
}

#rec2317813501 [data-elem-id="1779882150069"] .tn-atom {
  pointer-events: auto !important;
  cursor: pointer !important;
}
</style>

<script>
(function () {
  'use strict';

  var REC_ID = '2317813501';
  var BANNER_SELECTOR = '#rec2317813501';
  var SHOW_DURATION = 15000;
  var STORAGE_KEY = 'kochfit_top_banner_closed';
  var CLOSE_SELECTOR = BANNER_SELECTOR + ' [data-elem-id="1779882150069"]';

  /*
   * Cookie-скрипт: document.addEventListener('click', ..., true) на любой клик.
   * Этот обработчик регистрируется сразу (раньше cookie) и для ЛЮБОГО клика
   * по плашке вызывает stopImmediatePropagation — cookie не получает событие.
   * stopPropagation НЕ вызываем — ссылки VK внутри плашки продолжают работать.
   */
  document.addEventListener('click', function (e) {
    if (!e.target.closest || !e.target.closest(BANNER_SELECTOR)) return;

    e.stopImmediatePropagation();

    if (e.target.closest(CLOSE_SELECTOR)) {
      e.preventDefault();
      var rec = document.getElementById('rec' + REC_ID);
      if (rec) {
        rec.classList.remove('top-banner--visible');
        rec.classList.add('top-banner--hiding');
      }
      try {
        localStorage.setItem(STORAGE_KEY, '1');
      } catch (err) {}
    }
  }, true);

  function wasClosedByUser() {
    try {
      return localStorage.getItem(STORAGE_KEY) === '1';
    } catch (e) {
      return false;
    }
  }

  function initTopBanner() {
    if (wasClosedByUser()) return;

    var rec = document.getElementById('rec' + REC_ID);
    if (!rec || rec.getAttribute('data-top-banner-ready') === '1') return;
    if (!rec.querySelector('.t396__artboard')) return;

    rec.setAttribute('data-top-banner-ready', '1');

    rec.querySelectorAll('.t-animate').forEach(function (el) {
      el.classList.remove('t-animate');
    });

    var hideTimer = null;
    var isHidden = false;

    function hideBanner() {
      if (isHidden) return;
      isHidden = true;
      if (hideTimer) clearTimeout(hideTimer);
      rec.classList.remove('top-banner--visible');
      rec.classList.add('top-banner--hiding');
    }

    function showBanner() {
      rec.classList.remove('top-banner--visible', 'top-banner--hiding');
      void rec.offsetWidth;
      requestAnimationFrame(function () {
        requestAnimationFrame(function () {
          rec.classList.add('top-banner--visible');
        });
      });
      hideTimer = setTimeout(hideBanner, SHOW_DURATION);
    }

    showBanner();
  }

  function boot() {
    setTimeout(initTopBanner, 500);
  }

  if (typeof window.t_onReady === 'function') {
    window.t_onReady(boot);
  } else if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', boot);
  } else {
    boot();
  }
})();
</script>
