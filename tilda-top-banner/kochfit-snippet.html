<!-- Вставить целиком в блок T123 (HTML) на странице kochfit.ru -->
<style>
#rec2317813501 {
  position: fixed !important;
  margin: 0 !important;
  padding: 0 !important;
  z-index: 1000001 !important;
  opacity: 1 !important;
  visibility: visible !important;
  overflow: visible !important;
  transition: transform 1.5s cubic-bezier(0.4, 0, 0.2, 1);
  pointer-events: none;
  will-change: transform;
}

#rec2317813501 .t396,
#rec2317813501 .t396__artboard,
#rec2317813501 .t396__carrier,
#rec2317813501 .t396__filter {
  overflow: visible !important;
}

@media screen and (max-width: 768px) {
  #rec2317813501 {
    top: 0 !important;
    left: 0 !important;
    right: 0 !important;
    width: 100% !important;
    max-width: 100% !important;
    transform: translate3d(0, -110%, 0);
  }

  #rec2317813501.top-banner--visible {
    transform: translate3d(0, 0, 0);
    pointer-events: auto;
  }

  #rec2317813501.top-banner--hiding {
    transform: translate3d(0, -110%, 0);
    pointer-events: none;
  }
}

@media screen and (min-width: 769px) {
  #rec2317813501 {
    top: 96px !important;
    left: 16px !important;
    right: auto !important;
    width: 1200px !important;
    max-width: calc(100vw - 32px) !important;
    transform: translate3d(calc(-100% - 32px), 0, 0);
  }

  #rec2317813501.top-banner--visible {
    transform: translate3d(0, 0, 0);
    pointer-events: auto;
  }

  #rec2317813501.top-banner--hiding {
    transform: translate3d(calc(-100% - 32px), 0, 0);
    pointer-events: none;
  }
}

/* Только крестик этого блока — без общего класса top-banner-close */
#rec2317813501 [data-elem-id="1779882150069"] {
  z-index: 200 !important;
  pointer-events: auto !important;
  cursor: pointer !important;
}

#rec2317813501 [data-elem-id="1779882150069"] .tn-atom {
  pointer-events: auto !important;
  cursor: pointer !important;
}
</style>

<script>
(function () {
  'use strict';

  var REC_ID = '2317813501';
  var SHOW_DURATION = 15000;
  var STORAGE_KEY = 'kochfit_top_banner_closed';
  /* Только ID крестика внутри этого rec — не используем общие классы */
  var CLOSE_SELECTOR = '#rec2317813501 [data-elem-id="1779882150069"]';

  function wasClosedByUser() {
    try {
      return localStorage.getItem(STORAGE_KEY) === '1';
    } catch (e) {
      return false;
    }
  }

  function markClosedByUser() {
    try {
      localStorage.setItem(STORAGE_KEY, '1');
    } catch (e) {}
  }

  function getCloseEl(target) {
    return target && target.closest ? target.closest(CLOSE_SELECTOR) : null;
  }

  function initTopBanner() {
    if (wasClosedByUser()) return;

    var rec = document.getElementById('rec' + REC_ID);
    if (!rec || rec.getAttribute('data-top-banner-ready') === '1') return;
    if (!rec.querySelector('.t396__artboard')) return;

    rec.setAttribute('data-top-banner-ready', '1');

    rec.querySelectorAll('.t-animate').forEach(function (el) {
      el.classList.remove('t-animate');
    });

    var hideTimer = null;
    var isHidden = false;

    function hideBanner(saveChoice) {
      if (isHidden) return;
      isHidden = true;
      if (hideTimer) clearTimeout(hideTimer);
      rec.classList.remove('top-banner--visible');
      rec.classList.add('top-banner--hiding');
      if (saveChoice) markClosedByUser();
    }

    function showBanner() {
      rec.classList.remove('top-banner--visible', 'top-banner--hiding');
      void rec.offsetWidth;
      requestAnimationFrame(function () {
        requestAnimationFrame(function () {
          rec.classList.add('top-banner--visible');
        });
      });
      hideTimer = setTimeout(function () {
        hideBanner(false);
      }, SHOW_DURATION);
    }

    rec.addEventListener('click', function (e) {
      if (!getCloseEl(e.target)) return;
      e.preventDefault();
      e.stopPropagation();
      hideBanner(true);
    }, true);

    showBanner();
  }

  function boot() {
    setTimeout(initTopBanner, 500);
  }

  if (typeof window.t_onReady === 'function') {
    window.t_onReady(boot);
  } else if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', boot);
  } else {
    boot();
  }
})();
</script>
