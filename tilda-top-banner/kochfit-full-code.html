<!--
  KOCHFIT — два блока T123 (HTML)
  1) Cookie — в шапке сайта (где уже стоит .cookieBanner)
  2) Плашка VK — на нужных страницах (рядом с Zero Block rec2317813501)
-->

<!-- ═══════════════════════════════════════════════════════════════
  БЛОК 1 — COOKIE (шапка сайта, T123)
  Заменить существующий cookie-скрипт целиком
═══════════════════════════════════════════════════════════════ -->

<style>
  .cookie-banner-btn {
    cursor: pointer;
  }
  .cookieBanner.hidden {
    opacity: 0 !important;
    transform: translateY(20px) !important;
    pointer-events: none !important;
    transition: opacity 0.4s ease, transform 0.4s ease !important;
  }
  .cookieBanner.visible {
    opacity: 1;
    transform: translateY(0);
    transition: opacity 0.4s ease, transform 0.4s ease;
  }
</style>

<script>
(function () {
  'use strict';

  var STORAGE_KEY = 'cookieConsent';
  var STORAGE_DATE_KEY = 'cookieConsentDate';
  var isInitialized = false;

  function checkConsent() {
    return localStorage.getItem(STORAGE_KEY) === 'accepted';
  }

  function saveConsent() {
    localStorage.setItem(STORAGE_KEY, 'accepted');
    localStorage.setItem(STORAGE_DATE_KEY, new Date().toISOString());
  }

  function hideBanner() {
    var banner = document.querySelector('.cookieBanner');
    if (!banner) return;
    banner.classList.remove('visible');
    banner.classList.add('hidden');
    document.removeEventListener('click', handleGlobalClick, true);
    setTimeout(function () {
      banner.style.display = 'none';
    }, 400);
  }

  function showBanner() {
    var banner = document.querySelector('.cookieBanner');
    if (!banner) return;
    banner.style.display = 'block';
    setTimeout(function () {
      banner.classList.add('visible');
    }, 10);
  }

  function isPolicyLinkClick(element) {
    var current = element;
    while (current && current !== document.body) {
      if (current.classList && current.classList.contains('cookie-banner-link')) {
        return true;
      }
      current = current.parentElement;
    }
    return false;
  }

  function handleGlobalClick(event) {
    if (isPolicyLinkClick(event.target)) {
      return;
    }
    /* Не трогаем куки при клике по рекламной плашке VK */
    if (event.target.closest('#rec2317813501')) {
      return;
    }
    var cookieBanner = document.querySelector('.cookieBanner');
    if (!cookieBanner || !cookieBanner.contains(event.target)) {
      return;
    }
    saveConsent();
    hideBanner();
  }

  function init() {
    if (isInitialized) return;
    isInitialized = true;
    var banner = document.querySelector('.cookieBanner');
    if (!banner) return;
    if (checkConsent()) {
      banner.style.display = 'none';
    } else {
      showBanner();
      document.addEventListener('click', handleGlobalClick, true);
    }
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    setTimeout(init, 100);
  }
})();
</script>


<!-- ═══════════════════════════════════════════════════════════════
  БЛОК 2 — ПЛАШКА VK (T123 на странице с Zero Block rec2317813501)
═══════════════════════════════════════════════════════════════ -->

<style>
#rec2317813501 {
  position: fixed !important;
  margin: 0 !important;
  padding: 0 !important;
  z-index: 1000001 !important;
  opacity: 1 !important;
  visibility: visible !important;
  overflow: visible !important;
  transition: transform 1.5s cubic-bezier(0.4, 0, 0.2, 1);
  pointer-events: none;
  will-change: transform;
}

#rec2317813501 .t396,
#rec2317813501 .t396__artboard,
#rec2317813501 .t396__carrier,
#rec2317813501 .t396__filter {
  overflow: visible !important;
}

@media screen and (max-width: 768px) {
  #rec2317813501 {
    top: 0 !important;
    left: 0 !important;
    right: 0 !important;
    width: 100% !important;
    max-width: 100% !important;
    transform: translate3d(0, -110%, 0);
  }

  #rec2317813501.top-banner--visible {
    transform: translate3d(0, 0, 0);
    pointer-events: auto;
  }

  #rec2317813501.top-banner--hiding {
    transform: translate3d(0, -110%, 0);
    pointer-events: none;
  }
}

@media screen and (min-width: 769px) {
  #rec2317813501 {
    top: 96px !important;
    left: 16px !important;
    right: auto !important;
    width: 1200px !important;
    max-width: calc(100vw - 32px) !important;
    transform: translate3d(calc(-100% - 32px), 0, 0);
  }

  #rec2317813501.top-banner--visible {
    transform: translate3d(0, 0, 0);
    pointer-events: auto;
  }

  #rec2317813501.top-banner--hiding {
    transform: translate3d(calc(-100% - 32px), 0, 0);
    pointer-events: none;
  }
}

#rec2317813501 [data-elem-id="1779882150069"] {
  z-index: 200 !important;
  pointer-events: auto !important;
  cursor: pointer !important;
}

#rec2317813501 [data-elem-id="1779882150069"] .tn-atom {
  pointer-events: auto !important;
  cursor: pointer !important;
}
</style>

<script>
(function () {
  'use strict';

  var REC_ID = '2317813501';
  var SHOW_DURATION = 15000;
  var STORAGE_KEY = 'kochfit_top_banner_closed';
  var CLOSE_SELECTOR = '#rec2317813501 [data-elem-id="1779882150069"]';

  function wasClosedByUser() {
    try {
      return localStorage.getItem(STORAGE_KEY) === '1';
    } catch (e) {
      return false;
    }
  }

  function markClosedByUser() {
    try {
      localStorage.setItem(STORAGE_KEY, '1');
    } catch (e) {}
  }

  function getCloseEl(target) {
    return target && target.closest ? target.closest(CLOSE_SELECTOR) : null;
  }

  function initTopBanner() {
    if (wasClosedByUser()) return;

    var rec = document.getElementById('rec' + REC_ID);
    if (!rec || rec.getAttribute('data-top-banner-ready') === '1') return;
    if (!rec.querySelector('.t396__artboard')) return;

    rec.setAttribute('data-top-banner-ready', '1');

    rec.querySelectorAll('.t-animate').forEach(function (el) {
      el.classList.remove('t-animate');
    });

    var hideTimer = null;
    var isHidden = false;

    function hideBanner(saveChoice) {
      if (isHidden) return;
      isHidden = true;
      if (hideTimer) clearTimeout(hideTimer);
      rec.classList.remove('top-banner--visible');
      rec.classList.add('top-banner--hiding');
      if (saveChoice) markClosedByUser();
    }

    function showBanner() {
      rec.classList.remove('top-banner--visible', 'top-banner--hiding');
      void rec.offsetWidth;
      requestAnimationFrame(function () {
        requestAnimationFrame(function () {
          rec.classList.add('top-banner--visible');
        });
      });
      hideTimer = setTimeout(function () {
        hideBanner(false);
      }, SHOW_DURATION);
    }

    rec.addEventListener('click', function (e) {
      if (!getCloseEl(e.target)) return;
      e.preventDefault();
      e.stopPropagation();
      hideBanner(true);
    }, true);

    showBanner();
  }

  function boot() {
    setTimeout(initTopBanner, 500);
  }

  if (typeof window.t_onReady === 'function') {
    window.t_onReady(boot);
  } else if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', boot);
  } else {
    boot();
  }
})();
</script>
